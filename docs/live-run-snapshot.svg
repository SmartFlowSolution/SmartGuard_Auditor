<svg xmlns="http://www.w3.org/2000/svg" width="920" height="760" viewBox="0 0 920 760" role="img" aria-labelledby="title desc">
  <title id="title">SmartGuard Auditor live run snapshot</title>
  <desc id="desc">A live monitoring snapshot showing latest block, checked contracts, pending contracts, alert contracts, and grouped critical smart contract alerts.</desc>
  <defs>
    <style>
      .bg { fill: #eef2f1; }
      .panel { fill: #ffffff; stroke: #d7dfda; stroke-width: 1; }
      .card { fill: #ffffff; stroke: #cfd9d3; stroke-width: 1.2; }
      .selected { fill: #f0fbf9; stroke: #0f766e; stroke-width: 1.6; }
      .critical-border { stroke: #b42318; stroke-width: 6; }
      .ink { fill: #15201b; }
      .muted { fill: #52615a; }
      .accent { fill: #0f766e; }
      .critical { fill: #b42318; }
      .label { font: 700 16px Arial, Helvetica, sans-serif; letter-spacing: .2px; }
      .small { font: 700 14px Arial, Helvetica, sans-serif; }
      .body { font: 400 18px Arial, Helvetica, sans-serif; }
      .strong { font: 800 22px Arial, Helvetica, sans-serif; }
      .mono { font: 800 22px "SFMono-Regular", Consolas, monospace; }
      .mono-small { font: 700 16px "SFMono-Regular", Consolas, monospace; }
    </style>
  </defs>

  <rect class="bg" width="920" height="760"/>
